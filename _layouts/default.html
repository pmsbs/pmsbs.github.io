<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  </head>
  <body class="page">
    <nav class="navbar">
      <div class="container navbar__inner">
        <a href="/">
          <img class="navbar__logo" src="/assets/images/logo.png" alt="Logo da Prefeuritura Municipal de São Bento do Sapucaí - SP">
        </a>

        <ul class="navbar__list">
          <li class="navbar__item">
            <a class="navbar__link" href="/">Página Inicial</a>
          </li>
        </ul>
      </div>
    </nav>

    <header class="header page__header">
      <div class="container">
        <h1 class="header__title">
          {{ page.title }}
        </h1>
      </div>
    </header>

    <div class="container page__content">
      {{ content }}
    </div>

    <footer class="footer">
      <div class="container">
        <ul class="footer__list">
          <li class="footer__item">
            <a class="footer__link" target="_blank" href="https://saobentodosapucai.sp.gov.br/">Site</a>
          </li>

          <li class="footer__item">
            <a class="footer__link" target="_blank" href="https://github.com/pmsbs">Github</a>
          </li>
        </ul>
      </div>
    </footer>
  </body>
</html>
